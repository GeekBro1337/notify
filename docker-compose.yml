version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: elysia_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elysiadb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
